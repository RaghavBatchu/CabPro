services:
  # ─── Backend (Node.js / Express) ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cabpro-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.production # create this from .env.development.local
    environment:
      - NODE_ENV=production
    ports:
      - "5001:5001"
    networks:
      - cabpro-network

  # ─── Frontend (React / Vite → Nginx) ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # These are baked into the JS bundle at build time
        VITE_CLERK_PUBLISHABLE_KEY: pk_test_c21vb3RoLWJveGVyLTE3LmNsZXJrLmFjY291bnRzLmRldiQ
        VITE_API_BASE_URL: http://localhost:5001
    container_name: cabpro-frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    networks:
      - cabpro-network

networks:
  cabpro-network:
    driver: bridge
